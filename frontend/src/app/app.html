<nav class="navbar navbar-expand navbar-dark bg-dark">
  <div class="container-fluid">
    <!-- SGIM Logo and Name -->
    <a href="/" class="navbar-brand d-flex align-items-center">
      <!-- Simple SVG Placeholder for Logo -->
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="mr-2">
        <path
          d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"
          fill="white" />
      </svg>
      <span style="font-weight: bold; margin-right: 10px;">SGIM</span>
      <span style="font-size: 0.8em;">Sistema de Gestión de Incidencias y Mantenimiento</span>
    </a>

    <!-- Right-aligned nav items - Entirely hidden during mandatory password change -->
    <ul class="navbar-nav ml-auto" *ngIf="!isPasswordChangeRequired">

      <!-- General Admin / Tech Reports Link -->
      <li class="nav-item"
        *ngIf="isLoggedIn && (roles.includes('ROLE_ADMIN_MASTER') || roles.includes('ROLE_ADMIN_TECNICOS'))">
        <a class="nav-link d-flex align-items-center" routerLink="/home/reportes">
          <i class="bi bi-graph-up-arrow me-1"></i>
          Reportes
        </a>
      </li>

      <!-- Notifications Bell -->
      <li class="nav-item dropdown mr-3" *ngIf="isLoggedIn" appBootstrapDropdown>
        <a class="nav-link dropdown-toggle position-relative" href="javascript:void(0)" id="notiDropdown" role="button">
          <i class="bi bi-bell-fill" style="font-size: 1.2rem;"></i>
          <span *ngIf="unreadCount > 0"
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
            style="font-size: 0.6rem; padding: 0.3em 0.5em;">
            {{ unreadCount }}
          </span>
        </a>
        <div class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="notiDropdown"
          style="width: 320px; max-height: 450px; overflow-y: auto;">
          <div class="p-2 border-bottom d-flex justify-content-between align-items-center bg-light">
            <h6 class="mb-0 fw-bold">Notificaciones</h6>
            <button *ngIf="unreadCount > 0" class="btn btn-sm btn-link text-decoration-none p-0"
              (click)="markAllAsRead()">Marcar todas como leídas</button>
          </div>

          <div *ngIf="notificaciones.length === 0" class="p-4 text-center text-muted">
            <i class="bi bi-info-circle d-block mb-2" style="font-size: 1.5rem;"></i>
            No tienes notificaciones
          </div>

          <a *ngFor="let noti of notificaciones" href="javascript:void(0)" class="dropdown-item p-3 border-bottom"
            [ngClass]="{'bg-light': !noti.leida}" (click)="handleNotificationClick(noti)">
            <div class="d-flex align-items-start">
              <div class="noti-icon me-3">
                <i class="bi"
                  [ngClass]="noti.idTicket ? 'bi-ticket-detailed-fill text-primary' : 'bi-info-circle-fill text-info'"></i>
              </div>
              <div class="flex-grow-1" style="white-space: normal;">
                <p class="mb-1 fw-bold" style="font-size: 0.9rem;">{{ noti.titulo }}</p>
                <p class="mb-1 text-muted" style="font-size: 0.8rem;">{{ noti.mensaje }}</p>
                <small class="text-muted" style="font-size: 0.7rem;">{{ noti.fechaCreacion | date:'dd/MM/yyyy HH:mm'
                  }}</small>
              </div>
            </div>
          </a>
        </div>
      </li>

      <!-- Dropdown Menu for Logged In Users -->
      <li class="nav-item dropdown" *ngIf="isLoggedIn" appBootstrapDropdown>
        <a class="nav-link dropdown-toggle" href="javascript:void(0)" id="navbarDropdown" role="button"
          aria-haspopup="true">
          <img [src]="avatarUrl" width="30" height="30" class="rounded-circle">
        </a>
        <div class="dropdown-menu dropdown-menu-end shadow-sm border-0" aria-labelledby="navbarDropdown">
          <a class="dropdown-item" routerLink="/profile"><i class="bi bi-person me-2"></i>Perfil</a>
          <a class="dropdown-item" routerLink="/change-password"><i class="bi bi-key me-2"></i>Cambio de clave</a>
          <div class="dropdown-divider"></div>
          <a class="dropdown-item text-danger" href="javascript:void(0)" (click)="logout()"><i
              class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión</a>
        </div>
      </li>
    </ul>
  </div>
</nav>

<div>
  <router-outlet></router-outlet>
</div>
