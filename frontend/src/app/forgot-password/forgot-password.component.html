<div class="forgot-password-container">
  <div class="card forgot-password-card">
    <div class="login-header">
      <!-- Embedded SVG Logo -->
      <svg xmlns="http://www.w3.org/2000/svg" class="login-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L4 5v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V5l-8-3z" />
        <path d="M10.5 8.5l-2 2 2 2" />
        <path d="M13.5 12.5l2-2-2-2" />
        <path d="M12 15.5V18" />
        <path d="M9.5 14l-2 2" />
        <path d="M14.5 14l2 2" />
      </svg>
      <h3>Recuperar Contraseña</h3>
      <p class="text-muted">Ingresa tu correo electrónico para recibir instrucciones.</p>
    </div>
    <div class="card-body">
      <div *ngIf="isSuccessful" class="alert alert-success">
        <p>Si una cuenta con ese correo electrónico existe, hemos enviado un enlace para restablecer la contraseña.</p>
      </div>

      <form *ngIf="!isSuccessful" [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <div class="input-group">
            <i class="bi bi-envelope input-icon"></i>
            <input
              type="email"
              id="email"
              formControlName="email"
              class="form-control"
              [ngClass]="{ 'is-invalid': email?.invalid && (email?.dirty || email?.touched) }"
              placeholder="tu.correo@ejemplo.com"
            />
          </div>
          <div *ngIf="email?.invalid && (email?.dirty || email?.touched)" class="invalid-feedback">
            <div *ngIf="email?.errors?.['required']">El correo es requerido.</div>
            <div *ngIf="email?.errors?.['email']">Ingresa un correo electrónico válido.</div>
          </div>
        </div>

        <div *ngIf="isRequestFailed" class="alert alert-danger mt-3">
          {{ errorMessage }}
        </div>

        <div class="form-group">
          <button type="submit" class="btn btn-primary btn-block" [disabled]="forgotPasswordForm.invalid || isProcessing">
            <span *ngIf="isProcessing" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            <span *ngIf="!isProcessing">Enviar Enlace de Recuperación</span>
          </button>
        </div>

        <div class="login-link">
          <a routerLink="/login">Volver a iniciar sesión</a>
        </div>
      </form>
    </div>
  </div>
</div>
