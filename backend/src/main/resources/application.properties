# ── Backup Configuration ─────────────────────────────────────────────────────
# Directorio donde se escribe el dump temporal (relativo al directorio de trabajo
# del proceso, o ruta absoluta). El directorio se crea si no existe.
backup.dir=backups
# Ruta del binario pg_dump. Si está en el PATH del sistema puede dejarse como 'pg_dump'.
# En algunos entornos puede ser necesario la ruta absoluta, ej: /usr/bin/pg_dump
backup.pg_dump.path=pg_dump
# Tiempo máximo (en minutos) para que pg_dump complete. Si se supera, el proceso
# se cancela y el usuario recibe un mensaje de timeout.
backup.timeout.minutes=5

